<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOSE SANCHEZ | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .canvas-3d {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px border rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-10px); border-color: #22d3ee; }
        @keyframes glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .glow-bg { animation: glow 4s infinite ease-in-out; }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <div class="min-h-screen flex flex-col justify-between relative overflow-hidden">
        <div class="absolute inset-0 z-0 opacity-20 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1588345921523-c2dcdb7f1dcd?w=1920');"></div>
        <div class="absolute inset-0 z-0 bg-gradient-to-b from-transparent via-[#050505] to-[#050505]"></div>

        <header class="relative z-20 flex justify-between items-center px-10 py-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-lg border border-white/20 overflow-hidden bg-black">
                    <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                </div>
                <div class="leading-none">
                    <div class="font-black text-xl tracking-tighter">JOSE</div>
                    <div class="text-cyan-400 text-lg font-light tracking-[0.2em]">SANCHEZ</div>
                </div>
            </div>
            <div class="text-[10px] tracking-widest opacity-50">EST. 2026</div>
        </header>

        <main class="relative z-10 flex-1 flex flex-col lg:flex-row items-center justify-around px-10 gap-10">
            <div class="max-w-xl">
                <h1 class="font-black text-7xl lg:text-8xl leading-none tracking-tighter mb-6">
                    JOSE<br><span class="text-white/90">SANCHEZ</span>
                </h1>
                <p class="text-cyan-300 font-bold tracking-widest uppercase mb-8 text-sm">
                    FUSION VON DIGITALER PRÄZISION UND HANDWERKLICHER INTUITION
                </p>
                <a href="#" class="inline-block px-8 py-4 border border-white/20 rounded-full text-[10px] tracking-[0.3em] uppercase hover:bg-cyan-400 hover:text-black hover:border-cyan-400 transition-all">
                    KÜNSTLER KONTAKTIEREN
                </a>
            </div>

            <div id="scene" class="relative w-72 h-96 canvas-3d">
                <div class="absolute inset-0 bg-cyan-500/20 blur-3xl glow-bg rounded-full"></div>
                <div class="relative h-full w-full border border-white/30 bg-black overflow-hidden shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800" class="w-full h-full object-cover opacity-70">
                    <div class="absolute bottom-0 left-0 p-6 bg-gradient-to-t from-black to-transparent w-full">
                        <div class="text-cyan-300 font-black text-2xl">NEON GHOST</div>
                        <div class="text-[10px] opacity-60 italic">"Two ghosts started it all..."</div>
                    </div>
                </div>
            </div>
        </main>

        <section class="relative z-10 px-10 pb-20 grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-card p-4 rounded-xl">
                <div class="text-cyan-400 text-[10px] mb-2 font-mono">REF S.06</div>
                <div class="text-xs font-bold uppercase tracking-wider">Data Stream Fusion</div>
            </div>
            <div class="glass-card p-4 rounded-xl">
                <div class="text-cyan-400 text-[10px] mb-2 font-mono">REF S.11</div>
                <div class="text-xs font-bold uppercase tracking-wider">Authenticity & Glitch</div>
            </div>
            <div class="glass-card p-4 rounded-xl">
                <div class="text-cyan-400 text-[10px] mb-2 font-mono">REF S.15</div>
                <div class="text-xs font-bold uppercase tracking-wider">Analog Echo</div>
            </div>
            <div class="glass-card p-4 rounded-xl">
                <div class="text-cyan-400 text-[10px] mb-2 font-mono">REF S.19</div>
                <div class="text-xs font-bold uppercase tracking-wider">Metamorphosis</div>
            </div>
        </section>
    </div>

    <script>
        const scene = document.getElementById('scene');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            scene.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
